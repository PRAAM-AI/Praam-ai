services:
  web:
    build:
      context: .
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: praam-ai-caddy
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
